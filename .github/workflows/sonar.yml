name: SonarCloud

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.HW_SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=hin152_Hello-World
            -Dsonar.organization=hin152
